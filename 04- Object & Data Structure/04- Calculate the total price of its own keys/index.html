<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart Total Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Cart Total (Object + Method)</h2>
      <p class="hint">Add items and prices, then calculate the total.</p>

      <div class="section">
        <h3>Add Item</h3>
        <input type="text" id="item-name" placeholder="Item name (e.g. rice)" />
        <input type="number" id="item-price" placeholder="Price (e.g. 2000)" />
        <button id="add-btn">Add to Cart</button>
      </div>

      <div class="section">
        <h3>Actions</h3>
        <button id="total-btn">Calculate Total</button>
      </div>

      <div class="result-box">
        <p class="label">Cart Contents:</p>
        <pre id="cart-view" class="result">—</pre>
      </div>

      <div class="result-box">
        <p class="label">Total:</p>
        <p id="result" class="result">—</p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
