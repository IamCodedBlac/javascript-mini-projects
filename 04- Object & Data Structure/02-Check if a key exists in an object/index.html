<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check Key in Object</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Check Key in Student Object</h2>
      <p class="hint">Student Object: { name: "John", age: 20, grade: "A" }</p>

      <input
        type="text"
        id="key-input"
        placeholder="Enter key to check (e.g. age)"
      />

      <button id="check-btn">Check Key</button>

      <div class="result-box">
        <p class="label">Result:</p>
        <p id="result" class="result">—</p>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
