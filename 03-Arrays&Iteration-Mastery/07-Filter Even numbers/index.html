<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filter Even Numbers</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Filter Even Numbers</h2>
      <p class="hint">Enter numbers separated by commas (e.g. 4,2,7,9,6,3)</p>

      <input type="text" id="numbers" placeholder="Numbers: e.g. 4,2,7,9,6,3" />

      <button id="filter-btn">Show Even Numbers</button>

      <div class="result-box">
        <p class="label">Result:</p>
        <p id="result" class="result">—</p>
      </div>
    </div>

    <script src="./index.js"></script>
  </body>
</html>
