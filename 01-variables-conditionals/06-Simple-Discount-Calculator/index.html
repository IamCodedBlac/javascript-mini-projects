<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Discount Calculator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Simple Discount Calculator</h1>

        <input id="price-input" type="number" placeholder="Enter price" />

        <input id="discount-input" type="number" placeholder="Discount %" />

        <p>Final Price: <span id="final-price">--</span></p>
        <p>You Saved: <span id="saved-amount">--</span></p>
      </div>
    </div>

    <script src="./index.js"></script>
  </body>
</html>
